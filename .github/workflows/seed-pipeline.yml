name: Seed Pipeline

permissions:
  contents: read
  issues: write

on:
  schedule:
    - cron: '0 8 * * *'       # Daily at 08:00 UTC
  workflow_dispatch:
    inputs:
      budget_usd:
        description: 'Budget cap in USD for this seed run'
        required: false
        default: '1.00'
      category_batch_size:
        description: 'Number of new categories to propose'
        required: false
        default: '3'
      knowledge_batch_size:
        description: 'Number of categories to fetch Wikipedia sources for'
        required: false
        default: '5'
      questions_batch_size:
        description: 'Number of questions to generate'
        required: false
        default: '20'

jobs:
  seed-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        working-directory: pipeline
        run: npm ci

      - name: Health check -- verify Supabase is reachable
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/categories?limit=1")
          if [ "$STATUS" = "200" ]; then
            echo "Supabase reachable (HTTP $STATUS)"
          else
            echo "::error::Supabase unreachable (HTTP $STATUS). Project may be paused -- check https://supabase.com/dashboard"
            exit 1
          fi

      - name: Check seed completion threshold
        id: threshold
        working-directory: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx src/seed-threshold-check.ts

      - name: Run pipeline (seed batch)
        if: steps.threshold.outputs.seed_complete != 'true'
        working-directory: pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PIPELINE_BUDGET_USD: ${{ inputs.budget_usd || '1.00' }}
          CATEGORY_BATCH_SIZE: ${{ inputs.category_batch_size || '3' }}
          KNOWLEDGE_BATCH_SIZE: ${{ inputs.knowledge_batch_size || '5' }}
          QUESTIONS_BATCH_SIZE: ${{ inputs.questions_batch_size || '20' }}
        run: npx tsx src/run-pipeline.ts

      - name: Close rolling failure issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().slice(0, 10);
            const title = 'Seed Pipeline failing';

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
              per_page: 50,
            });
            const match = existing.find((i) => i.title === title);
            if (!match) {
              core.info('No open rolling failure issue to close.');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              body: `Pipeline ran green on ${date}. Run: ${runUrl}. Auto-closing.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: match.number,
              state: 'closed',
              state_reason: 'completed',
            });
            core.info(`Closed issue #${match.number}`);

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().slice(0, 10);
            const title = 'Seed Pipeline failing';
            const commentBody = `Failure on ${date}. Run: ${runUrl} (triggered by ${context.eventName}). Check log for the failing step.`;

            // Find existing open issue with the rolling title to dedupe consecutive failures.
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
              per_page: 50,
            });
            const match = existing.find((i) => i.title === title);

            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: commentBody,
              });
              core.info(`Appended comment to existing issue #${match.number}`);
            } else {
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: [
                  `The Seed Pipeline workflow is failing.`,
                  ``,
                  `First-seen run: ${runUrl} (${date})`,
                  ``,
                  `Subsequent failures will be appended as comments here.`,
                  `Close this issue once the pipeline runs green again.`,
                ].join('\n'),
                labels: ['pipeline-failure'],
              });
              core.info(`Created issue #${newIssue.data.number}`);
            }
